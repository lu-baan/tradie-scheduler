<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Trade Scheduler 2</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Content Security Policy: allow Google Maps scripts, styles, fonts and connections -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://maps.gstatic.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://maps.googleapis.com https://maps.gstatic.com;
      font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com;
      img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.supabase.co;
      connect-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.supabase.co https://tradie-scheduler-api.onrender.com;
      frame-src 'none';
      object-src 'none';
    ">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google Maps Places API — loading=async prevents the "loaded without async" warning -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBa_lDzSKAaf42dqC9ia2geNXBUqd6z3Cc&libraries=places&loading=async" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
